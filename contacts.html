<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="contacts.css" />
</head>
<body>
  <div class="background">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="left-nav">
        <a href="index.html" class="nav-item">HOME</a>
      </div>
      <div class="hamburger" onclick="toggleMenu()">☰</div>
      <div class="right-nav" id="mobileMenu">
        <a href="about.html" class="nav-item">ABOUT</a>
        <a href="education.html" class="nav-item">EDUCATION</a>
        <a href="projects.html" class="nav-item">PROJECTS</a>
        <a href="contacts.html" class="nav-item">CONTACT</a>
      </div>
    </nav>

    <!-- Contact Section -->
    <section class="contacts-section">
      <h1 class="section-title">
        <span class="projects-light">CONTACT</span> <span class="projects-bold">ME</span>
      </h1>

      <div class="contact-card">
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
          <input type="hidden" name="access_key" value="0d10db44-40af-4c88-8a86-58d9d8e3921c" />

          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" name="name" id="name" placeholder="Your Name" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Your Email" required />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea name="message" id="message" rows="5" placeholder="Your Message" required></textarea>
          </div>

          <button type="submit" class="submit-button">Send Message</button>
        </form>
      </div>
    </section>
  </div>
</body>
</html>
